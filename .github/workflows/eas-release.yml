name: EAS Release

# Daily release flow: push a version tag (v1.1.0, v1.2.0, ...) and this
# workflow triggers an EAS cloud build that auto-submits to the Play
# closed-testing (alpha) track using the "production" profiles in eas.json.
# The Google Group (toss007@googlegroups.com) testers get it automatically
# once Google's review clears.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-and-submit:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "::error::EXPO_TOKEN secret is not set (create one at https://expo.dev/settings/access-tokens, then: gh secret set EXPO_TOKEN)"
            exit 1
          fi
          if [ -z "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}" ]; then
            echo "::error::GOOGLE_SERVICE_ACCOUNT_JSON secret is not set (gh secret set GOOGLE_SERVICE_ACCOUNT_JSON < google-service-account.json)"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Restore Play service account key
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > google-service-account.json

      # --no-wait: the job ends once the build is queued; EAS servers do the
      # build and the submission, so no CI minutes are spent waiting.
      - name: Build and auto-submit to closed testing (alpha)
        run: eas build --platform android --profile production --non-interactive --no-wait --auto-submit
